name: Auto Generate Pages

on:
  schedule:
    - cron: "0 3 * * *"   # runs daily at 3am UTC
  workflow_dispatch:        # allows manual run via GitHub UI

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write       # required for git push

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Run page generator
        run: python generator/generate.py

      - name: Commit and push
        run: |
          git config --global user.name "rft-bot"
          git config --global user.email "bot@remote-finance-tools.vercel.app"
          git add .
          git diff --quiet && git diff --staged --quiet || \
            (git commit -m "🤖 Auto: new calculator pages" && git push origin main)
